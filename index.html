<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 日语对话练习机器人</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Segoe UI", system-ui, sans-serif; }
    .chat-container { height: 65vh; overflow-y: auto; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center mb-6 text-blue-700">
      AI 日语对话练习机器人
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-semibold mb-4">1. 设置对话场景</h2>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">角色名称</label>
            <input id="charName" value="咖啡店店员" class="w-full p-3 border rounded-lg" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">场景描述</label>
            <textarea id="scenario" rows="5" class="w-full p-3 border rounded-lg">你在京都的一家传统咖啡店工作。今天下午，来了一个正在学习日语的外国客人。请用自然、友好的语气和他对话，帮助他练习日语。如果用户说错了，可以温和纠正，并附上简单中文解释。</textarea>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">初始问候语</label>
            <input id="greeting" value="いらっしゃいませ！今日はどんなご用でしょうか？" class="w-full p-3 border rounded-lg" />
          </div>

          <button
            onclick="startChat()"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700"
          >
            开始对话
          </button>
        </div>
      </div>

      <div class="lg:col-span-2 bg-white rounded-xl shadow-lg flex flex-col">
        <div class="p-4 border-b bg-gray-50 rounded-t-xl">
          <span id="chatTitle" class="font-semibold">当前场景：咖啡店店员对话</span>
        </div>

        <div id="chat" class="chat-container p-6 space-y-6 flex-1"></div>

        <div class="p-4 border-t">
          <div class="flex gap-3">
            <input
              id="userInput"
              type="text"
              placeholder="输入日语或中文..."
              class="flex-1 p-4 border rounded-xl focus:outline-none focus:border-blue-500"
              onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button
              onclick="sendMessage()"
              class="bg-blue-600 text-white px-8 rounded-xl hover:bg-blue-700"
            >
              发送
            </button>
          </div>
          <p class="text-xs text-gray-500 mt-2 text-center">
            支持日语练习，AI 会用日语回复，并在需要时进行简单纠正
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let messages = [];

    function addMessage(role, content) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = role === "user" ? "flex justify-end" : "flex justify-start";

      div.innerHTML = `
        <div class="${role === "user" ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-900"} max-w-[80%] p-4 rounded-2xl">
          <p class="whitespace-pre-wrap">${escapeHtml(content)}</p>
        </div>
      `;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function startChat() {
      const charName = document.getElementById("charName").value.trim() || "角色";
      const scenario = document.getElementById("scenario").value.trim();
      const greeting = document.getElementById("greeting").value.trim();

      messages = [
        {
          role: "system",
          content: `你现在是一个日语学习对话机器人。角色设定：${charName}。场景：${scenario}。请全程主要使用自然日语回复，必要时补充简短中文解释。保持友好、耐心，帮助用户练习口语。如果用户表达不自然或有错误，请温和纠正，并给出更自然的说法。`
        },
        {
          role: "assistant",
          content: greeting
        }
      ];

      document.getElementById("chatTitle").textContent = `当前场景：${charName}对话`;
      document.getElementById("chat").innerHTML = "";
      addMessage("assistant", greeting);
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const text = input.value.trim();

      if (!text) return;

      if (messages.length === 0) {
        startChat();
      }

      addMessage("user", text);
      messages.push({ role: "user", content: text });
      input.value = "";

      const loading = document.createElement("div");
      loading.id = "loading";
      loading.className = "flex justify-start";
      loading.innerHTML = `
        <div class="bg-gray-100 text-gray-900 max-w-[80%] p-4 rounded-2xl">
          AI 思考中...
        </div>
      `;
      document.getElementById("chat").appendChild(loading);

      const chat = document.getElementById("chat");
      chat.scrollTop = chat.scrollHeight;

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ messages })
        });

        const data = await response.json();
        document.getElementById("loading")?.remove();

        if (!response.ok) {
          addMessage("assistant", `出错了：${data.error || "请求失败"}`);
          return;
        }

        addMessage("assistant", data.reply);
        messages.push({ role: "assistant", content: data.reply });

      } catch (error) {
        document.getElementById("loading")?.remove();
        addMessage("assistant", "发生网络错误，请检查 Flask 服务是否正在运行。");
      }
    }

    window.onload = () => {
      startChat();
    };
  </script>
</body>
</html>
